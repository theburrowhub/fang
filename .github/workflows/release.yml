name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

env:
  CARGO_TERM_COLOR: always
  BINARY: fang

permissions:
  contents: write

jobs:
  build:
    name: Build · ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Linux ────────────────────────────────────────────────────────────
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            archive: tar.gz

          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            archive: tar.gz

          # ── macOS ────────────────────────────────────────────────────────────
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz

          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz

          # ── Windows ──────────────────────────────────────────────────────────
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      # Install cross-compilation tools for Linux musl targets
      - name: Install cross-compilation tools (Linux musl)
        if: contains(matrix.target, 'linux-musl')
        run: |
          sudo apt-get update -q
          sudo apt-get install -y musl-tools
          if [[ "${{ matrix.target }}" == "aarch64-unknown-linux-musl" ]]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu
            echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          fi

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Determine version
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      # ── Package (Unix) ───────────────────────────────────────────────────────
      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          ARCHIVE="${{ env.BINARY }}_${VERSION}_${{ matrix.target }}.tar.gz"
          cp target/${{ matrix.target }}/release/${{ env.BINARY }} .
          tar -czf "$ARCHIVE" ${{ env.BINARY }} README.md
          echo "ASSET=$ARCHIVE" >> $GITHUB_ENV
          echo "SHA256=$(sha256sum $ARCHIVE | cut -d' ' -f1)" >> $GITHUB_ENV

      # ── Package (Windows) ────────────────────────────────────────────────────
      - name: Package (zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $VERSION = "${{ steps.version.outputs.VERSION }}"
          $ARCHIVE = "${{ env.BINARY }}_${VERSION}_${{ matrix.target }}.zip"
          Copy-Item "target\${{ matrix.target }}\release\${{ env.BINARY }}.exe" .
          Compress-Archive -Path "${{ env.BINARY }}.exe", "README.md" -DestinationPath $ARCHIVE
          $sha = (Get-FileHash $ARCHIVE -Algorithm SHA256).Hash.ToLower()
          echo "ASSET=$ARCHIVE" | Out-File -FilePath $env:GITHUB_ENV -Append
          echo "SHA256=$sha" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ASSET }}
          path: ${{ env.ASSET }}

      - name: Save SHA256
        shell: bash
        run: echo "${{ matrix.target }}=${{ env.SHA256 }}" >> sha256s.txt

      - name: Upload SHA256
        uses: actions/upload-artifact@v4
        with:
          name: sha256-${{ matrix.target }}
          path: sha256s.txt

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          pattern: fang_*
          merge-multiple: true

      - name: Download all SHA256s
        uses: actions/download-artifact@v4
        with:
          path: sha256s/
          pattern: sha256-*
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}

  homebrew:
    name: Update Homebrew Formula
    needs: release
    runs-on: ubuntu-latest

    steps:
      - name: Download SHA256s
        uses: actions/download-artifact@v4
        with:
          path: sha256s/
          pattern: sha256-*
          merge-multiple: true

      - name: Collect SHA256s
        id: sha
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          declare -A shas
          while IFS='=' read -r target hash; do
            shas[$target]=$hash
          done < <(cat sha256s/sha256s.txt)

          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "DARWIN_ARM64=${shas[aarch64-apple-darwin]}" >> $GITHUB_OUTPUT
          echo "DARWIN_AMD64=${shas[x86_64-apple-darwin]}" >> $GITHUB_OUTPUT
          echo "LINUX_ARM64=${shas[aarch64-unknown-linux-musl]}" >> $GITHUB_OUTPUT
          echo "LINUX_AMD64=${shas[x86_64-unknown-linux-musl]}" >> $GITHUB_OUTPUT

      - name: Checkout homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: theburrowhub/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update formula
        shell: bash
        run: |
          V="${{ steps.sha.outputs.VERSION }}"
          cat > homebrew-tap/Formula/fang.rb <<FORMULA
          # typed: false
          # frozen_string_literal: true

          class Fang < Formula
            desc "A modern, fast terminal file explorer"
            homepage "https://theburrowhub.github.io/fang"
            version "$V"
            license "MIT"

            on_macos do
              on_arm do
                url "https://github.com/theburrowhub/fang/releases/download/v#{version}/fang_#{version}_aarch64-apple-darwin.tar.gz"
                sha256 "${{ steps.sha.outputs.DARWIN_ARM64 }}"
              end

              on_intel do
                url "https://github.com/theburrowhub/fang/releases/download/v#{version}/fang_#{version}_x86_64-apple-darwin.tar.gz"
                sha256 "${{ steps.sha.outputs.DARWIN_AMD64 }}"
              end
            end

            on_linux do
              on_arm do
                url "https://github.com/theburrowhub/fang/releases/download/v#{version}/fang_#{version}_aarch64-unknown-linux-musl.tar.gz"
                sha256 "${{ steps.sha.outputs.LINUX_ARM64 }}"
              end

              on_intel do
                url "https://github.com/theburrowhub/fang/releases/download/v#{version}/fang_#{version}_x86_64-unknown-linux-musl.tar.gz"
                sha256 "${{ steps.sha.outputs.LINUX_AMD64 }}"
              end
            end

            def install
              bin.install "fang"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/fang --version")
            end
          end
          FORMULA

      - name: Commit and push formula
        working-directory: homebrew-tap
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/fang.rb
          git commit -m "fang: update to v${{ steps.sha.outputs.VERSION }}"
          git push
